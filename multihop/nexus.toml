subscribers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]

# Sensor node 4: far east end, only reachable via relay2 (tests 3 hops)
[nodes.sensor4]
profile = "arduino_mega"
deployments = [{ run_args = ["6"], position = { point = { x = 7.5, y = 0, z = 0 }, unit = "km" } }]

[[nodes.sensor4.protocols]]
