use = ["boards/arduino_mega", "./lora_short"]

[params]
timestep.length = 1
timestep.unit = "ms"
# ~300s of simulation (~4-5 superframes at new frequency)
timestep.count = 300000
time_dilation = 10.0
seed = 42
root = "~/simulations"

# ---------------------------------------------------------------
# Topology (7 nodes):
#
#                sensor1(3)          3 hops to gateway
#                   |  2.0 km
#                sensor3(5)          2 hops to gateway
#                   |  2.5 km
#  sensor2(4) -- gateway(0) -- relay1(1) -- relay2(2) -- sensor4(6)
#    2.5 km                     2.5 km       2.5 km       2.5 km
#
# Hard range cutoff: ~2.6 km (rx_min_dbm = -78, Friis @ 915 MHz,
# single antenna gain)
#
# Adjacency (all edges < 2.6 km):
#   gateway  <-> relay1, sensor2
#   relay1   <-> relay2, sensor3
#   relay2   <-> sensor4
#   sensor3  <-> sensor1
#
# Non-edges (> 2.6 km):
#   sensor4, sensor1, sensor3, relay2 cannot hear gateway
# ---------------------------------------------------------------

[nodes]

# Gateway node (address 0, ring 0) at origin
[nodes.gateway]
profile = "arduino_mega"
deployments = [{ run_args = ["0"], position = { point = { x = 0, y = 0, z = 0 }, unit = "km" } }]

[[nodes.gateway.protocols]]
root = "node"
name = "multihop"
build = "make"
build_args = ["build", "nodes=7"]
runner = "./bin/main"
publishers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]
subscribers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]

# Relay node 1: 2.5 km east of gateway
[nodes.relay1]
profile = "arduino_mega"
deployments = [{ run_args = ["1"], position = { point = { x = 2.5, y = 0, z = 0 }, unit = "km" } }]

[[nodes.relay1.protocols]]
root = "node"
name = "multihop"
build = "make"
build_args = ["build", "nodes=7"]
runner = "./bin/main"
publishers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]
subscribers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]

# Relay node 2: 5 km east of gateway (2.5 km from relay1)
[nodes.relay2]
profile = "arduino_mega"
deployments = [{ run_args = ["2"], position = { point = { x = 5, y = 0, z = 0 }, unit = "km" } }]

[[nodes.relay2.protocols]]
root = "node"
name = "multihop"
build = "make"
build_args = ["build", "nodes=7"]
runner = "./bin/main"
publishers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]
subscribers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]

# Sensor node 1: 3 hops from gateway, only reachable via sensor3 (2.0 km)
[nodes.sensor1]
profile = "arduino_mega"
deployments = [{ run_args = ["3"], position = { point = { x = 2.5, y = 4.5, z = 0 }, unit = "km" } }]

[[nodes.sensor1.protocols]]
root = "node"
name = "multihop"
build = "make"
build_args = ["build", "nodes=7"]
runner = "./bin/main"
publishers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]
subscribers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]

# Sensor node 2: close to gateway (2.5 km south)
[nodes.sensor2]
profile = "arduino_mega"
deployments = [{ run_args = ["4"], position = { point = { x = 0, y = -2.5, z = 0 }, unit = "km" } }]

[[nodes.sensor2.protocols]]
root = "node"
name = "multihop"
build = "make"
build_args = ["build", "nodes=7"]
runner = "./bin/main"
publishers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]
subscribers = ["lora_sf6", "lora_sf7", "lora_sf8", "lora_sf9", "lora_sf10", "lora_sf11", "lora_sf12"]

# Sensor node 3: 2.5 km north of relay1, out of gateway range (3.54 km)
[nodes.sensor3]
profile = "arduino_mega"
deployments = [{ run_args = ["5"], position = { point = { x = 2.5, y = 2.5, z = 0 }, unit = "km" } }]

[[nodes.sensor3.protocols]]
root = "node"
