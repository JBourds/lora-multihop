use = ["boards/arduino_mega", "../multihop/lora_short"]

[params]
timestep.length = 1
timestep.unit = "ms"
# 120s of simulation
timestep.count = 120000
time_dilation = 10.0
seed = 42
root = "~/simulations"

# ---------------------------------------------------------------
# Topology (4 nodes, linear chain):
#
#  node0(0) -- node1(1) -- node2(2) -- node3(3)
#    0 km       2.0 km       4.0 km       6.0 km
#
# Hard range cutoff: ~2.6 km (reuses lora_short link config)
#
# Adjacency:
#   node0 <-> node1  (2.0 km)
#   node1 <-> node2  (2.0 km)
#   node2 <-> node3  (2.0 km)
# ---------------------------------------------------------------

[nodes]

[nodes.node0]
profile = "arduino_mega"
deployments = [{ run_args = ["0"], position = { point = { x = 0, y = 0, z = 0 }, unit = "km" } }]

[[nodes.node0.protocols]]
root = "node"
name = "loramesh"
build = "./build.sh"
runner = "./build/main"
publishers = ["lora_sf7"]
subscribers = ["lora_sf7"]

[nodes.node1]
profile = "arduino_mega"
deployments = [{ run_args = ["1"], position = { point = { x = 2, y = 0, z = 0 }, unit = "km" } }]

[[nodes.node1.protocols]]
root = "node"
name = "loramesh"
build = "./build.sh"
runner = "./build/main"
publishers = ["lora_sf7"]
subscribers = ["lora_sf7"]

[nodes.node2]
profile = "arduino_mega"
deployments = [{ run_args = ["2"], position = { point = { x = 4, y = 0, z = 0 }, unit = "km" } }]

[[nodes.node2.protocols]]
root = "node"
name = "loramesh"
build = "./build.sh"
runner = "./build/main"
publishers = ["lora_sf7"]
subscribers = ["lora_sf7"]

[nodes.node3]
profile = "arduino_mega"
deployments = [{ run_args = ["3"], position = { point = { x = 6, y = 0, z = 0 }, unit = "km" } }]

[[nodes.node3.protocols]]
root = "node"
name = "loramesh"
build = "./build.sh"
runner = "./build/main"
publishers = ["lora_sf7"]
subscribers = ["lora_sf7"]
